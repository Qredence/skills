name: CI - Test and Validate Skills

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
    
    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check skills/ tests/ --output-format=github
      continue-on-error: true
    
    - name: Format check with black
      run: |
        pip install black
        black --check skills/ tests/
      continue-on-error: true
    
    - name: Validate skills
      run: |
        python scripts/skills_cli.py validate --skills-dir skills
    
    - name: Run tests with pytest
      run: |
        pytest tests/ -v --cov=skills --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
      continue-on-error: true

  catalog:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
    
    - name: Generate catalog
      run: |
        python scripts/skills_cli.py catalog --skills-dir skills --output catalog/skills.json
    
    - name: Upload catalog artifact
      uses: actions/upload-artifact@v4
      with:
        name: skills-catalog
        path: catalog/skills.json
